[pytest]
# Pytest configuration for House Hunt project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v                          # Verbose output
    --strict-markers            # Ensure all markers are registered
    --tb=short                  # Shorter traceback format
    --cov=.                     # Coverage for current directory
    --cov-report=term-missing   # Show missing lines in coverage
    --cov-report=html           # Generate HTML coverage report
    --cov-fail-under=70         # Fail if coverage below 70%
    -W ignore::DeprecationWarning  # Ignore deprecation warnings

# Test paths
testpaths = .

# Markers for organizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use external APIs)
    slow: Slow-running tests
    api: Tests that make actual API calls (expensive)

# Coverage options
[coverage:run]
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod