name: Collect Commute Data

on:
  schedule:
    # Monday-Friday at 7am EST (12pm UTC)
    - cron: '0 12 * * 1-5'
    # Monday-Friday at 5pm EST (10pm UTC)
    - cron: '0 22 * * 1-5'

  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  collect-commute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create directory structure
        run: |
          mkdir -p Data/Raw
          mkdir -p Data/Processed
          mkdir -p Data/Results
          mkdir -p Data/Logs

      - name: Setup API credentials
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GCP_MONITOR_KEY: ${{ secrets.GCP_MONITOR_KEY_JSON }}
          WORK_ADDR1: ${{ secrets.WORK_ADDR1 }}
          WORK_ADDR2: ${{ secrets.WORK_ADDR2 }}
        run: |
          echo "$GOOGLE_API_KEY" > Data/google_api_key
          if [ ! -z "$GCP_MONITOR_KEY" ]; then
            echo "$GCP_MONITOR_KEY" > Data/monitor-key.json
          fi
          # Create work addresses file from secrets
          echo "WORK_ADDR1=$WORK_ADDR1" > Data/work_addresses.txt
          echo "WORK_ADDR2=$WORK_ADDR2" >> Data/work_addresses.txt

      - name: Run commute collection
        run: |
          python main.py --commute --quiet
        continue-on-error: true  # Don't fail if API limit hit

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit updated tracking and stats files
        run: |
          git add Data/Logs/*
          git add Data/Results/*
          
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "Auto: Ran Commute module $(date -u +%Y-%m-%d_%H:%M_%a_UTC)"
            git push
          else
            echo "No changes to commit"
          fi

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: commute-results-${{ github.run_number }}
          path: |
            Data/Results/*.csv
            Data/Logs/app.log
          retention-days: 30
